<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Passport AI Fixed</title>
<style>
body{font-family:Arial,sans-serif;background:#111827;color:#fff;padding:20px}
input,button{padding:10px;margin:5px;width:100%;max-width:500px}
canvas{max-width:100%;border:1px solid #444;margin-top:10px}
button{background:#2563eb;color:#fff;border:none}
</style>
</head>
<body>
<h2>Passport AI (Fixed Version)</h2>

<input type="password" id="geminiKey" placeholder="AQ.Ab8RN6KX2IiNjmkVYLcAr7BHVdAgfXhuwA1K8Jh0TKNQW2gQuQ">
<input type="file" id="fileInput" accept="image/*">
<button id="processBtn">Process Image</button>

<p id="status">Ready</p>

<canvas id="sourceCanvas"></canvas>
<canvas id="resultCanvas"></canvas>

<script>
let sourceImg=null;

fileInput.onchange=(e)=>{
 const file=e.target.files[0];
 if(!file) return;

 const reader=new FileReader();
 reader.onload=(r)=>{
   const img=new Image();
   img.onload=()=>{
      sourceImg=img;
      const c=document.getElementById('sourceCanvas');
      c.width=400;c.height=500;
      c.getContext('2d').drawImage(img,0,0,400,500);
      status.textContent="✓ Image Loaded";
   };
   img.src=r.target.result;
 };
 reader.readAsDataURL(file);
};

processBtn.onclick=async()=>{
 if(!sourceImg){
   alert("Upload image first");
   return;
 }

 const apiKey=document.getElementById('geminiKey').value.trim();

 

 status.textContent="Processing...";

 try{
   const base64=document.getElementById('sourceCanvas')
     .toDataURL('image/jpeg',0.8)
     .split(',')[1];

   const res=await fetch(
   `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
   {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{
          parts:[
            {inline_data:{mime_type:"image/jpeg",data:base64}},
            {text:'Return ONLY JSON: {"t":10,"l":10,"w":80,"h":80}'}
          ]
        }]
      })
   });

   const data=await res.json();

   if(!res.ok){
      throw new Error(data?.error?.message || "Gemini request failed");
   }

   let crop={t:10,l:10,w:80,h:80};

   try{
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const match=text.match(/\{[\s\S]*\}/);
      if(match) crop=JSON.parse(match[0]);
   }catch(e){}

   const out=document.getElementById('resultCanvas');
   out.width=600; out.height=750;

   const ctx=out.getContext('2d');

   const sx=(crop.l/100)*sourceImg.width;
   const sy=(crop.t/100)*sourceImg.height;
   const sw=(crop.w/100)*sourceImg.width;
   const sh=(crop.h/100)*sourceImg.height;

   ctx.fillStyle="#ffffff";
   ctx.fillRect(0,0,600,750);
   ctx.drawImage(sourceImg,sx,sy,sw,sh,0,0,600,750);

   status.textContent="✓ Complete";

 }catch(err){
   console.error(err);
   status.textContent="Error";
   alert(err.message);
 }
};
</script>
</body>
</html>
