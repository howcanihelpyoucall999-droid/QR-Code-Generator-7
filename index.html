<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI Passport Photo & Background Remover</title>
<meta name="description" content="Remove image backgrounds and create passport / ID photos in your browser." />
<style>
  :root{
    --bg:#0b0d12; --bg2:#11141c; --card:#161a24; --card2:#1b2030;
    --border:#252b3b; --text:#eef1f7; --muted:#9aa3b2;
    --accent1:#6366f1; --accent2:#ec4899; --ok:#22c55e; --err:#ef4444;
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:radial-gradient(1200px 600px at 20% -10%,#1a1f33 0%,var(--bg) 60%) fixed;color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 60px}
  header{text-align:center;margin:8px 0 22px}
  header h1{margin:0 0 6px;font-size:24px;letter-spacing:-.01em;background:linear-gradient(90deg,#a5b4fc,#f9a8d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{margin:0;color:var(--muted);font-size:13px}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
  .card h2{margin:0 0 12px;font-size:14px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
  .drop{border:1.5px dashed #34405c;border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:.2s;background:rgba(255,255,255,.02)}
  .drop:hover,.drop.drag{border-color:var(--accent1);background:rgba(99,102,241,.08)}
  .drop strong{display:block;margin-bottom:4px}
  .drop small{color:var(--muted)}
  input[type=file]{display:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .swatches{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .sw{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);cursor:pointer;position:relative;transition:.15s}
  .sw.active{border-color:#fff;transform:scale(1.08);box-shadow:0 0 0 3px rgba(255,255,255,.1)}
  .hex{display:flex;gap:10px;align-items:center}
  .hex input[type=color]{width:46px;height:46px;border:1px solid var(--border);border-radius:12px;background:transparent;cursor:pointer;padding:2px}
  .hex input[type=text]{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font:inherit;text-transform:uppercase}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;border-radius:14px;border:none;font:600 15px inherit;cursor:pointer;width:100%;transition:.15s;color:#fff}
  .btn.primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));box-shadow:0 8px 24px rgba(99,102,241,.35)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
  .btn:disabled{opacity:.55;cursor:not-allowed;filter:grayscale(.2)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:520px){.grid{grid-template-columns:1fr}}
  .preview{background:
      linear-gradient(45deg,#1a1f2e 25%,transparent 25%),
      linear-gradient(-45deg,#1a1f2e 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1a1f2e 75%),
      linear-gradient(-45deg,transparent 75%,#1a1f2e 75%);
    background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;
    border:1px solid var(--border);border-radius:14px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .preview .label{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);padding:3px 8px;border-radius:8px;font-size:11px;color:#fff;letter-spacing:.05em;text-transform:uppercase}
  .preview img,.preview canvas{max-width:100%;max-height:100%;display:block}
  .preview .empty{color:var(--muted);font-size:12px;text-align:center;padding:12px}
  .status{margin-top:10px;padding:12px 14px;border-radius:12px;font-size:13px;display:none}
  .status.show{display:block}
  .status.info{background:rgba(99,102,241,.12);color:#c7d2fe;border:1px solid rgba(99,102,241,.3)}
  .status.err{background:rgba(239,68,68,.12);color:#fecaca;border:1px solid rgba(239,68,68,.3)}
  .status.ok{background:rgba(34,197,94,.12);color:#bbf7d0;border:1px solid rgba(34,197,94,.3)}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>AI Passport Photo Studio</h1>
    <p>Remove backgrounds and create ID photos — right in your browser.</p>
  </header>

  <div class="card">
    <h2>1. Upload photo</h2>
    <label class="drop" id="drop">
      <strong>Tap to choose a photo</strong>
      <small>JPG, PNG, or WEBP · max ~10MB</small>
      <input type="file" id="file" accept="image/jpeg,image/png,image/webp" />
    </label>
  </div>

  <div class="card">
    <h2>2. Background color</h2>
    <div class="swatches" id="swatches">
      <div class="sw active" data-color="#FFFFFF" style="background:#FFFFFF" title="White"></div>
      <div class="sw" data-color="#3B82F6" style="background:#3B82F6" title="Blue"></div>
      <div class="sw" data-color="#F5E6C8" style="background:#F5E6C8" title="Cream"></div>
      <div class="sw" data-color="#F9A8D4" style="background:#F9A8D4" title="Pink"></div>
      <div class="sw" data-color="#000000" style="background:#000000" title="Black"></div>
      <div class="sw" data-color="#E5E7EB" style="background:#E5E7EB" title="Gray"></div>
    </div>
    <div class="hex">
      <input type="color" id="picker" value="#FFFFFF" />
      <input type="text" id="hex" value="#FFFFFF" maxlength="7" />
    </div>
  </div>

  <div class="card">
    <h2>3. Generate</h2>
    <button class="btn primary" id="go" disabled>Remove background</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <h2>Preview</h2>
    <div class="grid">
      <div class="preview"><span class="label">Before</span><div class="empty" id="beforeEmpty">No image yet</div><img id="before" style="display:none" alt="" /></div>
      <div class="preview" style="background:none"><span class="label">After</span><div class="empty" id="afterEmpty">Result appears here</div><canvas id="after" style="display:none"></canvas></div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="reset">Reset</button>
      <button class="btn primary" id="download" disabled>Download PNG</button>
    </div>
  </div>

  <footer>Processing happens via ClearBackdrop API · your image is sent only for background removal.</footer>
</div>

<script>
(() => {
  const API_URL = "https://api.clearbackdrop.com/v1/remove-background";
  const FIELD   = "image_file"; // common convention

  const $ = (id) => document.getElementById(id);
  const fileInput = $("file"), drop = $("drop"), before = $("before"), beforeEmpty = $("beforeEmpty");
  const afterCanvas = $("after"), afterEmpty = $("afterEmpty");
  const go = $("go"), reset = $("reset"), download = $("download"), status = $("status");
  const picker = $("picker"), hex = $("hex"), swatches = $("swatches");

  let uploadedFile = null, cutoutImg = null, bgColor = "#FFFFFF";

  function setStatus(msg, type = "info") {
    if (!msg) { status.className = "status"; status.innerHTML = ""; return; }
    status.className = "status show " + type;
    status.innerHTML = type === "info" ? `<span class="spinner"></span>${msg}` : msg;
  }

  function isValidHex(v){ return /^#([0-9a-f]{6})$/i.test(v); }
  function setColor(c){
    if(!isValidHex(c)) return;
    bgColor = c.toUpperCase();
    picker.value = bgColor; hex.value = bgColor;
    [...swatches.children].forEach(s => s.classList.toggle("active", s.dataset.color.toUpperCase() === bgColor));
    if(cutoutImg) renderFinal();
  }

  swatches.addEventListener("click", e => { const t = e.target.closest(".sw"); if(t) setColor(t.dataset.color); });
  picker.addEventListener("input", e => setColor(e.target.value));
  hex.addEventListener("input", e => { let v = e.target.value.trim(); if(!v.startsWith("#")) v = "#" + v; if(isValidHex(v)) setColor(v); });

  function handleFile(f){
    if(!f) return;
    if(!/^image\/(jpeg|png|webp)$/i.test(f.type)){ setStatus("Please choose a JPG, PNG, or WEBP image.","err"); return; }
    if(f.size > 12*1024*1024){ setStatus("Image is too large (max ~10MB).","err"); return; }
    uploadedFile = f;
    const url = URL.createObjectURL(f);
    before.src = url; before.style.display = "block"; beforeEmpty.style.display = "none";
    go.disabled = false; setStatus("");
  }

  fileInput.addEventListener("change", e => handleFile(e.target.files[0]));
  ["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
  ["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
  drop.addEventListener("drop", e => handleFile(e.dataTransfer.files[0]));

  function renderFinal(){
    if(!cutoutImg) return;
    // Passport ratio 3:4, fit subject centered
    const W = 900, H = 1200;
    afterCanvas.width = W; afterCanvas.height = H;
    const ctx = afterCanvas.getContext("2d");
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,W,H);
    // Fit subject preserving aspect, scale to ~95% of canvas, centered
    const iw = cutoutImg.naturalWidth, ih = cutoutImg.naturalHeight;
    const scale = Math.min(W*0.95/iw, H*0.95/ih);
    const dw = iw*scale, dh = ih*scale;
    const dx = (W - dw)/2, dy = (H - dh)/2;
    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
    ctx.drawImage(cutoutImg, dx, dy, dw, dh);
    afterCanvas.style.display = "block"; afterEmpty.style.display = "none";
    download.disabled = false;
  }

  async function removeBg(){
    if(!uploadedFile) return;
    go.disabled = true; download.disabled = true;
    try {
      setStatus("Uploading image…","info");
      const fd = new FormData();
      fd.append(FIELD, uploadedFile, uploadedFile.name);
      fd.append("size","auto");
      fd.append("format","png");

      setStatus("Removing background…","info");

      let res;
      try { res = await fetch(API_URL, { method:"POST", body: fd }); }
      catch(netErr){
        throw new Error("Couldn't reach the background-removal service. Please check your internet connection and try again.");
      }

      if(!res.ok){
        let detail = "";
        try { const t = await res.text(); detail = t ? " " + t.slice(0,140) : ""; } catch(_){}
        if(res.status === 401 || res.status === 403) throw new Error("The background-removal service rejected the request (auth/quota).");
        if(res.status === 413) throw new Error("Image is too large for the service. Try a smaller photo.");
        if(res.status === 429) throw new Error("Too many requests right now. Please wait a moment and try again.");
        throw new Error(`Background removal failed (HTTP ${res.status}).${detail}`);
      }

      const blob = await res.blob();
      if(!blob || !blob.type.startsWith("image/")) throw new Error("Unexpected response from the service. Please try a different photo.");

      setStatus("Generating final image…","info");
      const img = new Image();
      img.onload = () => { cutoutImg = img; renderFinal(); setStatus("Done! Tap Download to save your photo.","ok"); go.disabled = false; };
      img.onerror = () => { setStatus("Couldn't load the processed image.","err"); go.disabled = false; };
      img.src = URL.createObjectURL(blob);
    } catch(err){
      console.error(err);
      setStatus(err.message || "Something went wrong. Please try again.","err");
      go.disabled = false;
    }
  }

  go.addEventListener("click", removeBg);

  download.addEventListener("click", () => {
    if(download.disabled) return;
    afterCanvas.toBlob(b => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(b);
      a.download = "passport-photo.png";
      document.body.appendChild(a); a.click(); a.remove();
    }, "image/png");
  });

  reset.addEventListener("click", () => {
    uploadedFile = null; cutoutImg = null;
    fileInput.value = "";
    before.src = ""; before.style.display = "none"; beforeEmpty.style.display = "block";
    afterCanvas.style.display = "none"; afterEmpty.style.display = "block";
    go.disabled = true; download.disabled = true;
    setStatus(""); setColor("#FFFFFF");
  });
})();
</script>
</body>
</html>
