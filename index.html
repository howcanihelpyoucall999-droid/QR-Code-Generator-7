<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassportAI | Supabase Pro Studio</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- SDKs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --accent: #1a6bff; --bg-dark: #0f172a; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        header { 
            position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .app-container { display: flex; min-height: calc(100vh - 70px); }
        aside { width: 340px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 1.5rem; height: calc(100vh - 70px); overflow-y: auto; }
        main { flex: 1; padding: 2rem; }
        .control-group { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); }
        select, input[type="number"], .btn { width: 100%; padding: 0.8rem; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 0.5rem; font-family: inherit; }
        .btn { background: var(--accent); border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
        .swatch { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: var(--accent); }
        .tabs { display: flex; gap: 25px; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .tab { padding: 12px 0; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; text-align: center; }
        .tab-content.active { display: block; }
        canvas { max-width: 100%; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: #000; }
        #a4Canvas { background: white; max-height: 80vh; }
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 14px 24px; background: var(--accent); color: white; border-radius: 10px; transform: translateY(150px); transition: 0.4s; z-index: 1001; }
        #toast.show { transform: translateY(0); }
        .progress-bar { height: 4px; background: var(--accent); width: 0%; transition: 0.3s; position: fixed; top: 0; left: 0; z-index: 200; }
        @media (max-width: 900px) { .app-container { flex-direction: column; } aside { width: 100%; } }
    </style>
</head>
<body>

<div class="progress-bar" id="pbar"></div>
<header>
    <div class="logo">PASSPORT AI</div>
    <div id="status" style="font-size: 0.7rem; color: var(--text-dim);">Supabase Connecting...</div>
</header>

<div class="app-container">
    <aside>
        <div class="control-group">
            <div class="upload-area" id="dropZone">
                <p>Upload Photo</p>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>
        </div>

        <div class="control-group">
            <select id="countrySelect">
                <option value="us">USA (2x2 inch)</option>
                <option value="bd">Bangladesh (40x50 mm)</option>
                <option value="uk">UK/EU (35x45 mm)</option>
                <option value="custom">Custom Dimensions</option>
            </select>
        </div>

        <div class="control-group">
            <div class="swatches">
                <div class="swatch active" style="background: #ffffff;" data-color="#ffffff"></div>
                <div class="swatch" style="background: #e2e8f0;" data-color="#e2e8f0"></div>
                <div class="swatch" style="background: #3b82f6;" data-color="#3b82f6"></div>
                <input type="color" id="customColor" style="width:32px; height:32px; border:none; background:none;">
            </div>
        </div>

        <div class="control-group">
            <label style="font-size: 0.7rem; color: var(--text-dim);">Brightness</label>
            <input type="range" id="bright" min="50" max="150" value="100">
            <label style="font-size: 0.7rem; color: var(--text-dim);">Contrast</label>
            <input type="range" id="contrast" min="50" max="150" value="100">
        </div>

        <button class="btn" id="processBtn">PROCESS WITH AI</button>
        <button class="btn" id="dlJpg" style="background: #334155; margin-top: 10px;">SAVE JPG</button>
        <button class="btn" id="dlPdf" style="background: #334155;">SAVE PDF</button>
    </aside>

    <main>
        <div class="tabs">
            <div class="tab active" data-tab="compare">Compare</div>
            <div class="tab" data-tab="print">A4 Sheet</div>
        </div>

        <div id="compare" class="tab-content active">
            <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                <canvas id="sourceCanvas"></canvas>
                <canvas id="resultCanvas"></canvas>
            </div>
        </div>

        <div id="print" class="tab-content">
            <button class="btn" id="dlA4" style="width: auto; padding: 10px 30px; margin-bottom: 20px;">Download A4 PDF</button>
            <canvas id="a4Canvas"></canvas>
        </div>
    </main>
</div>

<div id="toast">Message</div>

<script>
/** 
 * SUPABASE CONFIGURATION
 */
const SUPABASE_URL = "https://jwqgrdcsawfcjshptdth.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let state = { geminiKey: null, sourceImg: null, isProcessed: false, bgColor: '#ffffff' };

async function init() {
    try {
        const { data, error } = await sb.from('app_config').select('value').eq('id', 'GEMINI_API_KEY').single();
        if (data) {
            state.geminiKey = data.value;
            document.getElementById('status').textContent = "● Supabase Connected";
            document.getElementById('status').style.color = "#10b981";
        }
    } catch (e) {
        document.getElementById('status').textContent = "● Error Fetching Key";
    }
}

async function callAI() {
    if (!state.sourceImg || !state.geminiKey) return showToast("Upload image first");
    
    document.getElementById('pbar').style.width = "40%";
    const base64 = document.getElementById('sourceCanvas').toDataURL('image/jpeg', 0.8).split(',')[1];
    
    const prompt = `Return ONLY a JSON object: { "t": number, "l": number, "w": number, "h": number } for a passport crop (percentages)`;

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.geminiKey}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ inline_data: { mime_type: "image/jpeg", data: base64 } }, { text: prompt }] }] })
        });
        const data = await res.json();
        const ai = JSON.parse(data.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
        
        render(ai);
        state.isProcessed = true;
        document.getElementById('pbar').style.width = "100%";
        setTimeout(() => document.getElementById('pbar').style.width = "0%", 1000);
        showToast("AI Processing Complete");
    } catch (e) {
        showToast("AI Error");
        document.getElementById('pbar').style.width = "0%";
    }
}

function render(ai) {
    const canv = document.getElementById('resultCanvas');
    const ctx = canv.getContext('2d');
    const w = 600, h = 750;
    canv.width = w; canv.height = h;

    ctx.fillStyle = state.bgColor;
    ctx.fillRect(0,0,w,h);

    const sx = (ai.l/100)*state.sourceImg.width;
    const sy = (ai.t/100)*state.sourceImg.height;
    const sw = (ai.w/100)*state.sourceImg.width;
    const sh = (ai.h/100)*state.sourceImg.height;

    ctx.filter = `brightness(${document.getElementById('bright').value}%) contrast(${document.getElementById('contrast').value}%)`;
    ctx.drawImage(state.sourceImg, sx, sy, sw, sh, 0, 0, w, h);
    
    renderA4();
}

function renderA4() {
    const a4 = document.getElementById('a4Canvas');
    a4.width = 2480; a4.height = 3508;
    const ctx = a4.getContext('2d');
    ctx.fillStyle = "white"; ctx.fillRect(0,0,2480,3508);
    for(let i=0; i<12; i++) {
        const x = 150 + (i%3)*700;
        const y = 150 + Math.floor(i/3)*800;
        ctx.drawImage(document.getElementById('resultCanvas'), x, y, 600, 750);
        ctx.strokeStyle = "#eee"; ctx.strokeRect(x,y,600,750);
    }
}

// UI HANDLERS
document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (f) => {
        state.sourceImg = new Image();
        state.sourceImg.onload = () => {
            const c = document.getElementById('sourceCanvas');
            c.width = 400; c.height = 500;
            c.getContext('2d').drawImage(state.sourceImg, 0, 0, 400, 500);
        };
        state.sourceImg.src = f.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('processBtn').onclick = callAI;
document.querySelectorAll('.swatch').forEach(s => {
    s.onclick = () => {
        document.querySelector('.swatch.active').classList.remove('active');
        s.classList.add('active');
        state.bgColor = s.dataset.color;
    }
});

document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
        t.classList.add('active');
        document.getElementById(t.dataset.tab).classList.add('active');
    }
});

document.getElementById('dlJpg').onclick = () => {
    const a = document.createElement('a');
    a.download = 'passport.jpg';
    a.href = document.getElementById('resultCanvas').toDataURL('image/jpeg', 0.9);
    a.click();
};

document.getElementById('dlA4').onclick = () => {
    const doc = new jspdf.jsPDF('p', 'mm', 'a4');
    doc.addImage(document.getElementById('a4Canvas').toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
    doc.save("a4-sheet.pdf");
};

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
