<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robot Product Landing Page</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --muted:#666666;
      --btn:#111111;
      --btnText:#ffffff;
      --card:#f6f6f6;
      --shadow:0 24px 80px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    .page{
      min-height:100vh;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .sheet{
      width:min(1400px,100%);
      min-height:92vh;
      background:#fff;
      border-radius:28px;
      position:relative;
      overflow:hidden;
    }
    .topbar{
      display:flex;
      justify-content:flex-end;
      padding:22px 24px 0;
      position:relative;
      z-index:2;
    }
    .menu-btn{
      border:0;
      border-radius:999px;
      background:#2c2c2c;
      color:#fff;
      padding:14px 20px;
      font-size:16px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      box-shadow:0 8px 22px rgba(0,0,0,.12);
      cursor:pointer;
    }
    .dots{font-size:22px; line-height:1}
    .menu{
      position:absolute;
      top:78px;
      right:24px;
      width:180px;
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.10);
      overflow:hidden;
      display:none;
      z-index:5;
    }
    .menu button{
      width:100%;
      border:0;
      background:#fff;
      text-align:left;
      padding:12px 14px;
      cursor:pointer;
      font-size:14px;
    }
    .menu button:hover{background:#111;color:#fff}

    .content{
      min-height:calc(92vh - 72px);
      display:grid;
      place-items:center;
      padding:20px 24px 28px;
    }
    .center{
      width:min(980px,100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      text-align:center;
    }

    .product-button{
      border:0;
      background:transparent;
      padding:0;
      cursor:pointer;
      width:min(760px,100%);
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
    }
    .product-wrap{
      position:relative;
      width:min(640px,86vw);
      aspect-ratio:1/1;
      border-radius:36px;
      background:transparent;
      display:grid;
      place-items:center;
    }
    .product-wrap::before{
      content:"";
      position:absolute;
      inset:6%;
      border-radius:34px;
      background:linear-gradient(145deg,#ffffff,#f0f0f0);
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.04);
    }
    .product-core{
      position:relative;
      width:78%;
      height:78%;
      border-radius:32px;
      background:#101010;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 24px 50px rgba(0,0,0,.12);
      overflow:hidden;
    }
    .product-core img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .knob{
      position:absolute;
      right:10%;
      top:50%;
      transform:translateY(-50%);
      width:22%;
      aspect-ratio:1/1;
      border-radius:50%;
      background:linear-gradient(135deg,#d6d6d6,#a8a8a8);
      box-shadow:0 16px 26px rgba(0,0,0,.15);
      border:1px solid rgba(0,0,0,.04);
    }
    .knob::after{
      content:"";
      position:absolute;
      inset:14%;
      border-radius:50%;
      background:linear-gradient(135deg,#cfcfcf,#f6f6f6);
      box-shadow:inset 0 0 14px rgba(255,255,255,.6);
    }

    .title{
      margin:0;
      font-size:clamp(34px, 5vw, 64px);
      line-height:1.02;
      letter-spacing:-.04em;
      font-weight:700;
    }
    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }
    .buy-btn{
      border:0;
      border-radius:999px;
      padding:16px 28px;
      background:#111;
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 12px 26px rgba(0,0,0,.14);
    }

    .viewer{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:20;
    }
    .viewer.open{display:flex}
    .modal{
      width:min(980px,100%);
      background:#fff;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 30px 100px rgba(0,0,0,.18);
      border:1px solid rgba(0,0,0,.06);
    }
    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 18px;
      border-bottom:1px solid rgba(0,0,0,.08);
      background:#fff;
    }
    .modal-head h2{
      margin:0;
      font-size:18px;
    }
    .modal-actions{
      display:flex;
      gap:10px;
    }
    .icon-btn{
      border:1px solid rgba(0,0,0,.10);
      background:#fff;
      color:#111;
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
    }
    .icon-btn.close{
      background:#111;
      color:#fff;
      border-color:#111;
    }
    .stage{
      background:#fff;
      padding:28px;
      display:grid;
      place-items:center;
    }
    .tilt{
      width:min(560px,100%);
      transition:transform .08s linear;
      transform-style:preserve-3d;
    }
    .tilt-card{
      position:relative;
      aspect-ratio:1/1;
      border-radius:36px;
      padding:18px;
      background:#fff;
      box-shadow:0 24px 70px rgba(0,0,0,.10);
      border:1px solid rgba(0,0,0,.06);
    }
    .tilt-card::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:44px;
      background:radial-gradient(circle at center, rgba(0,0,0,.05), transparent 60%);
      filter:blur(16px);
      z-index:-1;
    }
    .tilt-img{
      width:100%;
      height:100%;
      border-radius:30px;
      overflow:hidden;
      background:#111;
    }
    .tilt-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    @media (max-width: 720px){
      .page{padding:10px}
      .sheet{border-radius:22px; min-height:calc(100vh - 20px)}
      .topbar{padding:16px 16px 0}
      .content{padding:12px 16px 24px}
      .title{font-size:34px}
      .menu-btn{padding:12px 16px; font-size:15px}
      .modal-head{padding:14px 14px}
      .stage{padding:16px}
      .buy-btn{padding:14px 24px}
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="sheet">
      <div class="topbar">
        <div style="position:relative">
          <button class="menu-btn" id="menuBtn">Menu <span class="dots">⋮</span></button>
          <div class="menu" id="menu">
            <button>Home</button>
            <button>Products</button>
            <button>About</button>
            <button>Contact</button>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="center">
          <button class="product-button" id="openViewer" aria-label="Open product 3D view">
            <div class="product-wrap">
              <div class="product-core">
                <img src="product.jpg" alt="Product" onerror="this.style.display='none'">
              </div>
              <div class="knob"></div>
            </div>
          </button>

          <h1 class="title">Buy your dream robot</h1>

          <div class="cta">
            <button class="buy-btn">Buy</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="viewer" id="viewer">
    <div class="modal">
      <div class="modal-head">
        <h2>3D Product View</h2>
        <div class="modal-actions">
          <button class="icon-btn" id="resetBtn">Reset</button>
          <button class="icon-btn close" id="closeBtn">Close</button>
        </div>
      </div>
      <div class="stage" id="stage">
        <div class="tilt" id="tilt">
          <div class="tilt-card">
            <div class="tilt-img">
              <img src="product.jpg" alt="Product preview" onerror="this.style.display='none'">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const menu = document.getElementById('menu');
    const viewer = document.getElementById('viewer');
    const openViewer = document.getElementById('openViewer');
    const closeBtn = document.getElementById('closeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const stage = document.getElementById('stage');
    const tilt = document.getElementById('tilt');

    let rx = 0, ry = 0;

    menuBtn.addEventListener('click', () => {
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#menuBtn') && !e.target.closest('#menu')) {
        menu.style.display = 'none';
      }
    });

    function openModal() {
      viewer.classList.add('open');
    }
    function closeModal() {
      viewer.classList.remove('open');
      rx = 0; ry = 0;
      tilt.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
    }
    function resetTilt() {
      rx = 0; ry = 0;
      tilt.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
    }

    openViewer.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    resetBtn.addEventListener('click', resetTilt);
    viewer.addEventListener('click', (e) => {
      if (e.target === viewer) closeModal();
    });

    stage.addEventListener('pointermove', (e) => {
      const rect = stage.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;
      ry = (px - 0.5) * 24;
      rx = (0.5 - py) * 18;
      tilt.style.transform = `perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg)`;
    });

    stage.addEventListener('pointerleave', resetTilt);
  </script>
</body>
</html>
